name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: [self-hosted, skills]
    steps:
      - uses: actions/checkout@v5

      - name: Enforce self-hosted runners
        # Workspace policy: never GitHub-hosted runners. Inline-array form
        # (runs-on: [self-hosted, <label>]) keeps this greppable — a
        # multi-line runs-on fails here on purpose.
        run: |
          bad=$(grep -RnE '^[[:space:]]*runs-on:' .github/workflows --include='*.yml' --include='*.yaml' | grep -v 'self-hosted' || true)
          if [ -n "$bad" ]; then
            printf '%s\n' "$bad"
            echo "::error::every workflow job must run on a self-hosted runner"
            exit 1
          fi

      - name: Ensure ShellCheck
        run: command -v shellcheck >/dev/null || brew install shellcheck

      - name: Lint shell scripts
        run: make lint

      - name: Validate SKILL.md frontmatter
        run: make validate

      - name: Build .skill artifacts
        run: make build

      - name: Upload .skill artifacts
        uses: actions/upload-artifact@v6
        with:
          name: skill-bundles
          path: dist/*.skill
          retention-days: 14
