name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: [self-hosted, skills]
    steps:
      - uses: actions/checkout@v4

      - name: Ensure ShellCheck
        run: command -v shellcheck >/dev/null || brew install shellcheck

      - name: Lint shell scripts
        run: make lint

      - name: Validate SKILL.md frontmatter
        run: make validate

      - name: Build .skill artifacts
        run: make build

      - name: Upload .skill artifacts
        uses: actions/upload-artifact@v4
        with:
          name: skill-bundles
          path: dist/*.skill
          retention-days: 14
